[defaults]
inventory = /home/ec2-user/lec13_CircleCI/.ansible/inventory.ini
host_key_checking = False
interpreter_python = /usr/bin/python2.7
command_warnings = False
timeout = 60 
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
[target_ec2]
18.180.2.113 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa

