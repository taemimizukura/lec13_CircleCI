--- 
# lec13_CircleCI/.ansible/roles/04_nodejs/tasks/main.yml

- name: Check if nvm is installed
  shell: bash -lc "nvm --version"
  register: nvm_installed
  changed_when: no
  ignore_errors: yes

- name: 'Download NVM install script'
  get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh
    dest: /tmp/install_nvm.sh
  when: nvm_installed is failed

- name: 'Run NVM install script'
  command: bash /tmp/install_nvm.sh
  when: nvm_installed is success

- name: 'Check if NVM is properly installed'
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm --version
  register: nvm_check
  ignore_errors: true

- name: 'Install Node.js 17.9.1 if NVM is available'
  shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm install 17.9.1
  when: nvm_check is success




