---
#lec13_CircleCI/.ansible/roles/04_nodejs/tasks/main.yml
- name: Check if NVM is installed
  command: command -v nvm
  register: nvm_installed
  ignore_errors: true

- name: Download NVM install script
  get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh
    dest: /tmp/install_nvm.sh
  when: nvm_installed is failed  # nvmがインストールされていない場合

- name: Run NVM install script
  command: bash /tmp/install_nvm.sh
  when: nvm_installed is failed 

- name: Check if Node.js is installed
  command: node -v
  register: node_installed
  ignore_errors: true

- name: Install Node.js 17.9.1 if not installed
  command: nvm install 17.9.1
  when: node_installed is failed or (node_installed.stdout is not search("v17.9.1") if node_installed.stdout is defined else true)


