---
- name: 'yum update'
  yum:
    name: '*'
    state: latest
  become: yes

- name: 'Install required packages'
  yum:
    name: 
      - gcc
      - gcc-c++
      - make
      - openssl-devel
      - libyaml-devel
      - readline-devel
      - zlib-devel
      - libxml2-devel
      - libxslt-devel
      - sqlite-devel
      - libffi-devel
      - ImageMagick
      - ImageMagick-devel
    state: present
  become: true 

# rbenvのインストール  
- name: Clone rbenv repository
  git:
    repo: https://github.com/rbenv/rbenv.git
    dest: /home/ec2-user/rbenv

- name: 'rbenvのshファイルを配置'
  template:
    src: rbenv_system.sh.j2
    dest: /etc/profile.d/rbenv.sh
    owner: root
    group: root
    mode: 0755

# ruby-buildのインストール
- name: Clone ruby-build repository
  git:
    repo: https://github.com/rbenv/ruby-build.git
    dest: /home/ec2-user/rbenv/plugins/ruby-build


# Rubyのインストール
- name: Check installed ruby versions exits
  ansible.builtin.shell:
    cmd: bash -lc "rbenv versions --bare"
  changed_when: false
  register: installed_ruby_versions_check

- name: Install Specific ruby version
  shell: bash -lc "rbenv install {{ version }}"
  when: "'3.2.3' not in installed_ruby_versions_check.stdout_lines"

- name: Check global ruby version
  ansible.builtin.shell:
    cmd: bash -lc "rbenv global"
  changed_when: false
  register: global_ruby_version_check

- name: Set global ruby version
  shell: bash -lc "rbenv global {{ version }}"
  when: "'3.2.3' not in global_ruby_version_check.stdout_lines"

- name: Check installed Bundler versions
  shell: bash -lc "gem list bundler"
  register: installed_bundler_versions_check

- name: Install Bundler 2.3.14
  shell: bash -lc "gem install bundler -v 2.3.14"
  when: "'bundler (2.3.14)' not in installed_bundler_versions_check.stdout_lines"
