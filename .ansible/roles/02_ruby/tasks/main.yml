---
# rbenvのインストール  
- name: Clone rbenv repository
  git:
    repo: https://github.com/rbenv/rbenv.git
    dest: /home/ec2-user/rbenv
    force: yes 

- name: 'rbenvのshファイルを配置'
  template:
    src: rbenv_system.sh.j2
    dest: /etc/profile.d/rbenv.sh
    owner: root
    group: root
    mode: 0755

# ruby-buildのインストール
- name: Clone ruby-build repository
  git:
    repo: https://github.com/rbenv/ruby-build.git
    dest: /home/ec2-user/rbenv/plugins/ruby-build
    force: yes 

# Rubyのインストール
- name: Check installed Ruby versions
  command: ruby -v
  register: installed_ruby_versions_check
  ignore_errors: true  


- name: Install Specific ruby version
  shell: bash -lc "rbenv install {{ version }}"
  when: installed_ruby_versions_check.stdout is not defined or 
        version not in installed_ruby_versions_check.stdout

- name: Check global ruby version
  ansible.builtin.shell:
    cmd: bash -lc "rbenv global"
  changed_when: false
  register: global_ruby_version_check

- name: Set global ruby version
  shell: bash -lc "rbenv global {{ version }}"
  when: global_ruby_version_check.stdout is not defined or 
        version not in global_ruby_version_check.stdout
