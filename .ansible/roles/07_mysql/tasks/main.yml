---
- name: Remove MariaDB packages
  yum:
    name: mariadb-*
    state: absent

- name: install mysql repository
  become: yes
  yum:
    name: 'https://repo.mysql.com//mysql80-community-release-el7-11.noarch.rpm'
    state: present

- name: Import gpg-key
  become: yes
  rpm_key:
    state: present
    key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2022

- name: Disable MySQL 8.0 Community repository
  command: yum-config-manager --disable mysql80-community
  ignore_errors: yes 

- name: Enable MySQL 5.7 Community repository
  command: yum-config-manager --enable mysql57-community
  ignore_errors: yes  

- name: Install yum-utils
  yum:
    name: yum-utils
    state: present

- name: Update yum cache
  command: yum makecache

- name: Install MySQL and dependencies
  yum:
    name:
      - MySQL-python
      - mysql-devel
    state: present

- name: Create database.yml from template
  become: yes
  template:
    src: database.yml.j2
    dest: "{{ app_dir }}/config/database.yml"



