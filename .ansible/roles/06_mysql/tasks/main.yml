--- 
# lec13_CircleCI/.ansible/roles/06_mysql/tasks/main.yml

- name: 'Check if MariaDB is installed via rpm'
  shell: rpm -qa | grep -i mariadb
  register: mariadb_installed
  ignore_errors: yes

- name: 'Remove MariaDB packages'
  yum:
    name: mariadb-*
    state: absent
  become: yes
  when: mariadb_installed.stdout != ""


- name: Install MySQL development package
  yum:
    name: mysql-devel
    state: present
  become: yes

- name: 'Run bundle install'
  shell: bash -lc "bundle install"
  args:
    chdir: "{{ app_dir }}"
  ignore_errors: yes

- name: 'Create database.yml from template'
  template:
    src: database.yml.j2
    dest: "{{ app_dir }}/config/database.yml"
  become: yes
