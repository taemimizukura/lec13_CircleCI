---
- name: Remove MariaDB packages
  yum:
    name: mariadb-*
    state: absent

- name: Install pip3 for Python 3
  yum:
    name: python3-pip
    state: present
  become: yes

- name: Install PyMySQL using pip3
  pip:
    name: PyMySQL
    state: present
    executable: /usr/bin/pip3
  become: yes

- name: Install specific MySQL version
  yum:
    name:
      - mysql-community-server-5.7.39
      - mysql-community-client-5.7.39
    state: latest
  become: yes


- name: Install mysql2 gem
  shell: |
    export RBENV_ROOT="/home/ec2-user/rbenv"
    export PATH="$RBENV_ROOT/bin:$PATH"
    eval "$(rbenv init -)"
    gem install mysql2 -v '0.5.6'
  args:
    executable: /bin/bash
  become: yes
  become_user: ec2-user

- name: Install MySQL Community Server
  yum:
    name: mysql-community-server
    state: present

- name: Start MySQL service
  service:
    name: mysqld
    state: started
  become: yes

- name: Wait for MySQL to start
  wait_for:
    port: 3306
    delay: 10

#初期パスワードを取得する
- name: Get MySQL temporary password
  shell: "sudo grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}'"
  register: temp_password_result
  changed_when: false

- name: Set MySQL temporary password
  set_fact:
    mysql_temp_password: "{{ temp_password_result.stdout }}"


- name: Change MySQL root password
  mysql_user:
    name: root
    host: localhost
    password: "{{ lookup('env', 'RDS_PASSWORD') }}"
    login_user: root
    login_password: "{{ mysql_temp_password }}"
    state: present


# データベース設定ファイルを作成
- name: Create database.yml from template
  template:
    src: database.yml.j2
    dest: /home/ec2-user/raisetech-live8-sample-app/config/database.yml
    owner: ec2-user
    group: ec2-user
    mode: '0644'
  vars:
    db_password: "{{ new_password }}"