---
# lec13_CircleCI/.ansible/roles/01_setup/tasks/main.yml
- name: Check if the application directory exists
  stat:
    path: "{{ app_dir }}"
  register: app_dir_stat

- name: Clone the repository
  git:
    repo: 'https://github.com/yuta-ushijima/raisetech-live8-sample-app.git'
    dest: "{{ app_dir }}"
  when: not app_dir_stat.stat.exists

- name: 'yum update'
  yum:
    name: '*'
    state: latest  #最新版あればアップデート

- name: 'Install required packages'
  yum:
    name: 
      - git 
      - gcc
      - gcc-c++
      - make
      - openssl-devel
      - libyaml-devel
      - readline-devel
      - zlib-devel
      - libxml2-devel
      - libxslt-devel
      - sqlite-devel
      - libffi-devel
      - ImageMagick
      - ImageMagick-devel
      - curl
      - bzip2
      - bzip2-devel
    state: present    #パッケージがインストール済なら何もしない
