version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.2.3
  ansible-playbook: orbss/ansible-playbook@0.0.5
  ruby: circleci/ruby@2.1.4

jobs:
  cfn-lint:
    executor: python/default
    steps:
      - checkout
      - run: pip install cfn-lint
      - run:
          name: Run cfn-lint for CloudFormation
          command: |
            cfn-lint -i W3002 -t cloudformation/*.yml

  execute-cloudformation:
    executor: aws-cli/default
    steps:
      - checkout
      - aws-cli/setup:
          aws_access_key_id: AWS_ACCESS_KEY_ID
          aws_secret_access_key: AWS_SECRET_ACCESS_KEY
          region: AWS_DEFAULT_REGION
      - run:
          name: Deploy to AWS from template
          command: |
            aws cloudformation deploy \
              --template-file cloudformation/2_RDS_S3.yml \
              --stack-name Lec13-RDS 

  build:
    docker:
      - image: circleci/python:2.7
    steps:
      - run:
          name: Set Environment Variables
          command: |
            echo 'export MY_VAR="my_value"' >> $BASH_ENV
      - run:
          name: Get CloudFormation Outputs
          command: |
            OUTPUTS=$(aws cloudformation describe-stacks --stack-name Lec13-RDS --query "Stacks[0].Outputs" --output json)
            echo "OUTPUTS: $OUTPUTS"
            echo "export RDS_ENDPOINT=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey==`RDSEndpoint`) | .OutputValue')" >> $BASH_ENV
            echo "export S3_BUCKET=$(echo $OUTPUTS | jq -r '.[] | select(.OutputKey==`S3Bucket`) | .OutputValue')" >> $BASH_ENV
            

  execute-ansible:
    executor: ansible-playbook/default
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "SHA256:RAPTEJreaHTgO3h0I390R2bRQ+c/felwiLwwMUB5n9I"
      - ansible-playbook/install:
          version: 2.9.27
      - ansible-playbook/playbook:
          playbook: ansible/playbook.yml
          playbook-options: 'ansible/inventory.ini'

workflows:
  workflow:
    jobs:
      - cfn-lint  # Lint jobを最初に実行
      - execute-cloudformation:
          requires:
            - cfn-lint  # cfn-lintが成功した後に実行
      - execute-ansible:
          requires:
            - execute-cloudformation  # CloudFormationが成功した後に実行
