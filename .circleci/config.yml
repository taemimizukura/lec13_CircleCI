jobs:
  execute-cloudformation:
    machine: true  
    steps:
      - checkout
      - run:
          name: Deploy to AWS from template
          command: |
            aws cloudformation deploy \
              --template-file cloudformation/2_RDS_S3.yml \
              --stack-name Lec13-RDS

  execute-ansible:
    machine: true
    steps:
      - checkout
      - run:
          name: Install Ansible
          command: |
            sudo yum install -y ansible
      - run:
          name: Run Ansible Playbook
          command: ansible-playbook .ansible/playbook.yml -u ec2-user -i .ansible/inventory.ini --private-key /home/ec2-user/.ssh/id_rsa --extra-vars "ansible_ssh_extra_args='-o StrictHostKeyChecking=no' RDS_PASSWORD=${RDS_PASSWORD}"
