version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.2.3
  ruby: circleci/ruby@2.1.4
  ansible-playbook: orbss/ansible-playbook@0.0.5
  aws-cloudformation: orbss/aws-cloudformation@0.1.6

jobs:
  cfn-lint:
    docker:
      - image: circleci/python:3.8
    steps:
      - checkout
      - run: pip install cfn-lint
      - run:
          name: Run cfn-lint for CloudFormation
          command: cfn-lint -i W3002 -t cloudformation/*.yml

  execute-cloudformation:
    docker:
      - image: amazon/aws-cli:latest
    steps:
      - checkout
      - aws-cli/setup:
          aws_access_key_id: AWS_ACCESS_KEY_ID
          aws_secret_access_key: AWS_SECRET_ACCESS_KEY
          region: AWS_DEFAULT_REGION
      - run:
          name: Deploy to AWS from template
          command: aws cloudformation deploy --template-file cloudformation/2_RDS_S3.yml --stack-name Lec13-RDS-S3

  execute-ansible:
    docker:
      - image: circleci/python:3.8
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "SHA256:4FHjhuVlFUKbXS8PtXn9iudtugfViiFpOzfjCsSYv4g"
            
  install_and_setup_cli:
    executor:
        name: default
    steps:
      - aws-cli/install
      - aws-cli/setup

      - run:
          name: Get RDS Endpoint
          command: |
            RDS_ENDPOINT=$(aws rds describe-db-instances --db-instance-identifier lec13-target-rds --query "DBInstances[0].Endpoint.Address" --output text)
            echo "RDS_ENDPOINT=${RDS_ENDPOINT}" >> $BASH_ENV
      - run:
          name: Run Ansible Playbook
          command: |
            ansible-playbook -i .ansible/inventory .ansible/playbook.yml --private-key ~/.ssh/id_rsa --extra-vars "rds_endpoint=${RDS_ENDPOINT}"

  test-serverspec:
    docker:
      - image: ruby:3.2
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            gem install rspec
            gem install serverspec
      - run:
          name: Run Serverspec tests
          command: |
            cd serverspec
            rake spec

workflows:
  workflow:
    jobs:
      - cfn-lint
      - execute-cloudformation:
          requires:
            - cfn-lint
      - execute-ansible:
          requires:
            - execute-cloudformation
      - test-serverspec:
          requires:
            - execute-ansible
